name: Push model to Replicate

on:
  workflow_dispatch:
jobs:
  push_to_replicate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      # Optional cleanup steps
      - name: Cleanup unused docker images
        run: |
          sudo apt autoremove --purge
          sudo apt autoclean
          sudo apt clean
          docker system prune -af

      - name: Clear Docker Cache
        run: docker builder prune -af

      - name: Install Cog
        run: |
          sudo curl -o /usr/local/bin/cog -L https://github.com/replicate/cog/releases/latest/download/cog_Linux_x86_64
          sudo chmod +x /usr/local/bin/cog
          cog --version

      - name: Log in to Replicate
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          echo $REPLICATE_API_TOKEN | cog login --token-stdin

      # Remove or comment out this step:
      # - name: Download model weights
      #   run: |
      #     cog run script/download_weights.py

      - name: Push to Replicate
        run: |
          cog push r8.im/jweek/mask_maker --no-cache
